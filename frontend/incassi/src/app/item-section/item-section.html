<div class='flex items-center justify-between mb-3'>
  <h2> Gli ultimi {{ title() | lowercase }}</h2>
  <p-button
    [title]="'Aggiungi' + title()"
    rounded
    outlined
    icon='fa fa-plus'
  />
</div>
<div class='card'>
  <p-carousel [value]='products' [numVisible]='3' [numScroll]='1'>
    <ng-template let-product #item>
      <div class='border border-surface-200 dark:border-surface-700 rounded m-2 p-4'>
        <div class='mb-4'>
          <div class='relative mx-auto'>
            <img src='/img-test/anime_skyline.png'
                 [alt]='product.name'
                 class='w-full rounded-border' aria-label='pippo'
            />
            <p-tag [value]='product.inventoryStatus'
                   [severity]="'success'"
                   class='absolute dark:bg-surface-900!'
                   [ngStyle]="{ 'left.px': 5, 'top.px': 5 }"
            />
          </div>
        </div>
        <div class='flex flex-col md:flex-row gap-y-4 justify-between items-center'>
          <div class='mt-0 font-semibold text-sm'>Nome del file</div>
          <p-button title="Visualizza l'anteprima" rounded icon='fa fa-magnifying-glass' />
        </div>
      </div>
    </ng-template>
  </p-carousel>
</div>
